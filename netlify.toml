[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/extract"
  to = "/.netlify/functions/extract"
  status = 200

[[redirects]]
  from = "/api/proxy-download"
  to = "/.netlify/functions/proxy-download"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
